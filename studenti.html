<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Študenti</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #f1f3f4;
  color: #111;
  min-height: 100vh;
}

/* TOP BAR */
.topbar {
  background: #fff;
  border-bottom: 1px solid #ddd;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-size: 1.4rem;
  font-weight: 700;
  color: #3665f3;
  letter-spacing: -0.03em;
  white-space: nowrap;
}

.search-wrap {
  flex: 1;
  max-width: 600px;
  display: flex;
  border: 2px solid #3665f3;
  border-radius: 25px;
  overflow: hidden;
}

.search-wrap input {
  flex: 1;
  border: none;
  outline: none;
  padding: 0 1rem;
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
}

.search-wrap button {
  background: #3665f3;
  border: none;
  color: #fff;
  padding: 0 1.2rem;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}

.topbar-right {
  margin-left: auto;
  font-size: 0.82rem;
  color: #555;
  white-space: nowrap;
}

/* FILTERS */
.filters {
  background: #fff;
  border-bottom: 1px solid #ddd;
  padding: 0.6rem 2rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.filters span {
  font-size: 0.8rem;
  color: #555;
  margin-right: 0.3rem;
}

.chip {
  border: 1px solid #ccc;
  border-radius: 20px;
  padding: 0.3rem 0.9rem;
  font-size: 0.8rem;
  cursor: pointer;
  background: #fff;
  font-family: 'Inter', sans-serif;
  color: #333;
  transition: all 0.15s;
}

.chip:hover { border-color: #3665f3; color: #3665f3; }
.chip.active { background: #3665f3; color: #fff; border-color: #3665f3; }

/* MAIN */
.main {
  max-width: 1300px;
  margin: 0 auto;
  padding: 1.5rem 2rem;
}

.results-info {
  font-size: 0.85rem;
  color: #555;
  margin-bottom: 1rem;
}

.results-info strong { color: #111; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1rem;
}

/* CARD */
.card {
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.15s;
  animation: fadeIn 0.3s ease both;
  display: flex;
  flex-direction: column;
}

.card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  transform: translateY(-2px);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-img-wrap {
  position: relative;
  background: #f5f5f5;
}

.card-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}

.card-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: #3665f3;
  color: #fff;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.card-body {
  padding: 0.85rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.card-nickname {
  font-size: 0.72rem;
  color: #3665f3;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.card-name {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.3;
  color: #111;
}

.card-funfact {
  font-size: 0.78rem;
  color: #666;
  line-height: 1.4;
  margin-top: 0.2rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

.card-footer {
  padding: 0.6rem 0.85rem;
  border-top: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-age {
  font-size: 0.78rem;
  color: #888;
}

.card-btn {
  font-size: 0.75rem;
  font-weight: 600;
  color: #3665f3;
  background: none;
  border: 1px solid #3665f3;
  border-radius: 4px;
  padding: 0.2rem 0.6rem;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.15s;
}

.card-btn:hover { background: #3665f3; color: #fff; }

/* MODAL */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.overlay.open { display: flex; }

.modal {
  background: #fff;
  border-radius: 10px;
  max-width: 480px;
  width: 100%;
  overflow: hidden;
  animation: popIn 0.18s ease;
}

@keyframes popIn {
  from { transform: scale(0.96); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.modal-img { width: 100%; height: 280px; object-fit: cover; display: block; }

.modal-body { padding: 1.5rem; }

.modal-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.modal-titles {}
.modal-nick { font-size: 0.75rem; font-weight: 700; color: #3665f3; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
.modal-name { font-size: 1.4rem; font-weight: 700; }

.modal-close-x {
  background: none;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  color: #aaa;
  line-height: 1;
  padding: 0.2rem;
}
.modal-close-x:hover { color: #333; }

.modal-divider { border: none; border-top: 1px solid #eee; margin: 0.75rem 0; }

.modal-row {
  display: flex;
  gap: 0.5rem;
  align-items: flex-start;
  margin-bottom: 0.6rem;
  font-size: 0.88rem;
}
.modal-label { color: #888; min-width: 80px; }
.modal-val { font-weight: 500; color: #111; }

.modal-funfact-box {
  background: #f0f4ff;
  border-left: 3px solid #3665f3;
  border-radius: 0 6px 6px 0;
  padding: 0.8rem 1rem;
  margin-top: 0.8rem;
  font-size: 0.88rem;
  color: #333;
  line-height: 1.6;
}

.modal-funfact-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #3665f3;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.35rem;
}

.modal-close-btn {
  display: block;
  width: 100%;
  margin-top: 1.25rem;
  padding: 0.75rem;
  background: #3665f3;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
}
.modal-close-btn:hover { background: #2851c9; }

/* LOADING / EMPTY */
.state-msg {
  grid-column: 1/-1;
  text-align: center;
  padding: 4rem;
  color: #888;
  font-size: 0.9rem;
}
.loader {
  width: 28px; height: 28px;
  border: 3px solid #e0e0e0;
  border-top-color: #3665f3;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .topbar { padding: 0 1rem; }
  .main { padding: 1rem; }
  .filters { padding: 0.6rem 1rem; }
  .logo { font-size: 1.1rem; }
  .topbar-right { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">študenti<span style="color:#111">.</span>sk</div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Hľadaj študenta..." oninput="applyFilters()"/>
    <button>Hľadaj</button>
  </div>
  <div class="topbar-right" id="topbar-count"></div>
</div>

<div class="filters">
  <span>Vek:</span>
  <button class="chip active" onclick="setAge('all', this)">Všetci</button>
  <button class="chip" onclick="setAge('19', this)">19</button>
  <button class="chip" onclick="setAge('20', this)">20</button>
  <button class="chip" onclick="setAge('21', this)">21</button>
  <button class="chip" onclick="setAge('22+', this)">22+</button>
</div>

<div class="main">
  <div class="results-info" id="results-info"></div>
  <div class="grid" id="grid">
    <div class="state-msg"><div class="loader"></div>Načítavam...</div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <img class="modal-img" id="m-img" src="" alt=""/>
    <div class="modal-body">
      <div class="modal-top">
        <div class="modal-titles">
          <div class="modal-nick" id="m-nick"></div>
          <div class="modal-name" id="m-name"></div>
        </div>
        <button class="modal-close-x" onclick="closeModal()">✕</button>
      </div>
      <hr class="modal-divider"/>
      <div class="modal-row"><span class="modal-label">Celé meno</span><span class="modal-val" id="m-fullname"></span></div>
      <div class="modal-row"><span class="modal-label">Vek</span><span class="modal-val" id="m-age"></span></div>
      <div class="modal-funfact-box">
        <div class="modal-funfact-label">Fun fact</div>
        <div id="m-funfact"></div>
      </div>
      <button class="modal-close-btn" onclick="closeModal()">Zavrieť</button>
    </div>
  </div>
</div>

<script>
let all = [];
let ageFilter = 'all';

async function load() {
  try {
    const res = await fetch('api.json');
    all = await res.json();
    applyFilters();
    document.getElementById('topbar-count').textContent = all.length + ' študentov celkom';
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="state-msg">Nepodarilo sa načítať dáta.</div>';
  }
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  let result = all.filter(s => {
    const matchAge = ageFilter === 'all'
      ? true
      : ageFilter === '22+'
        ? s.age >= 22
        : s.age === parseInt(ageFilter);
    const matchSearch = s.name.toLowerCase().includes(q) || s.nickname.toLowerCase().includes(q);
    return matchAge && matchSearch;
  });
  render(result);
}

function setAge(val, btn) {
  ageFilter = val;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function render(students) {
  const info = document.getElementById('results-info');
  info.innerHTML = `<strong>${students.length}</strong> výsledkov`;

  if (!students.length) {
    document.getElementById('grid').innerHTML = '<div class="state-msg">Žiadni študenti nenájdení.</div>';
    return;
  }

  document.getElementById('grid').innerHTML = students.map((s, i) => `
    <div class="card" style="animation-delay:${i * 0.04}s">
      <div class="card-img-wrap">
        <img class="card-img" src="${s.image}" alt="${s.name}" loading="lazy"/>
        <span class="card-badge">ID #${s.id}</span>
      </div>
      <div class="card-body">
        <div class="card-nickname">${s.nickname}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-funfact">${s.fun_fact}</div>
      </div>
      <div class="card-footer">
        <span class="card-age">${s.age} rokov</span>
        <button class="card-btn" onclick="openModal(${s.id})">Detail</button>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const s = all.find(x => x.id === id);
  if (!s) return;
  document.getElementById('m-img').src = s.image;
  document.getElementById('m-nick').textContent = s.nickname;
  document.getElementById('m-name').textContent = s.nickname;
  document.getElementById('m-fullname').textContent = s.name;
  document.getElementById('m-age').textContent = s.age + ' rokov';
  document.getElementById('m-funfact').textContent = s.fun_fact;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function bgClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

load();
</script>
</body>
</html>
