<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Študenti</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f5f2ee;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #888;
    --accent: #c8602a;
    --border: #e8e4de;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    padding: 3rem 3rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  header h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  header h1 span { color: var(--accent); }
  .count { font-size: 0.8rem; color: var(--muted); font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; padding-bottom: 0.3rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
    padding: 2.5rem 3rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .card-img { width: 100%; height: 200px; object-fit: cover; display: block; background: var(--border); }

  .card-body { padding: 1.25rem; }
  .card-nickname {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
  }
  .card-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.6rem; }
  .card-funfact {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 20px;
    max-width: 420px;
    width: 100%;
    overflow: hidden;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal img { width: 100%; height: 260px; object-fit: cover; }
  .modal-body { padding: 1.75rem; }
  .modal-nickname {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
  }
  .modal-name { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.25rem; }
  .modal-row { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  .modal-row:last-of-type { border-bottom: none; }
  .modal-row span:first-child { color: var(--muted); }
  .modal-row span:last-child { font-weight: 500; max-width: 60%; text-align: right; }
  .modal-funfact-box {
    margin-top: 1rem;
    background: var(--bg);
    border-radius: 10px;
    padding: 1rem;
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.6;
    border-left: 3px solid var(--accent);
  }
  .modal-funfact-label { font-size: 0.7rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
  .modal-close {
    display: block; width: 100%; margin-top: 1.25rem; padding: 0.75rem;
    background: var(--text); color: #fff; border: none; border-radius: 10px;
    font-size: 0.9rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.15s;
  }
  .modal-close:hover { opacity: 0.8; }

  .loading { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 4rem; font-size: 0.9rem; }
  .loader { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    header, .grid { padding-left: 1.25rem; padding-right: 1.25rem; }
    header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    header h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Naši <span>študenti</span></h1>
  <div class="count" id="count">Načítavam...</div>
</header>

<div class="grid" id="grid">
  <div class="loading">
    <div class="loader"></div>
    Načítavam študentov...
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <img id="modal-img" src="" alt=""/>
    <div class="modal-body">
      <div class="modal-nickname" id="modal-nickname"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-row"><span>Celé meno</span><span id="modal-fullname"></span></div>
      <div class="modal-row"><span>Vek</span><span id="modal-age"></span></div>
      <div class="modal-funfact-box">
        <div class="modal-funfact-label">Fun fact</div>
        <div id="modal-funfact"></div>
      </div>
      <button class="modal-close" onclick="document.getElementById('overlay').classList.remove('open')">Zavrieť</button>
    </div>
  </div>
</div>

<script>
let all = [];

async function load() {
  try {
    const res = await fetch('api.json');
    all = await res.json();
    render(all);
    document.getElementById('count').textContent = all.length + ' študentov';
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="loading">Nepodarilo sa načítať dáta.</div>';
  }
}

function render(students) {
  const grid = document.getElementById('grid');
  grid.innerHTML = students.map((s, i) => `
    <div class="card" style="animation-delay:${i * 0.06}s" onclick="openModal(${s.id})">
      <img class="card-img" src="${s.image}" alt="${s.name}" loading="lazy"/>
      <div class="card-body">
        <div class="card-nickname">${s.nickname}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-funfact">${s.fun_fact}</div>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const s = all.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modal-img').src = s.image;
  document.getElementById('modal-nickname').textContent = s.nickname;
  document.getElementById('modal-name').textContent = s.nickname;
  document.getElementById('modal-fullname').textContent = s.name;
  document.getElementById('modal-age').textContent = s.age + ' rokov';
  document.getElementById('modal-funfact').textContent = s.fun_fact;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

load();
</script>
</body>
</html>
